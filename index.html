<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Para Chanita 💛</title>
    <style>
        /* --- ESTILOS BASE --- */
        * { box-sizing: border-box; }
        body, html { margin: 0; padding: 0; height: 100%; width: 100%; background: #000; color: #fff; font-family: sans-serif; overflow: hidden; display: flex; justify-content: center; align-items: center; }
        .hidden { display: none !important; }
        .texto-amarillo { color: #ffd600; text-align: center; font-weight: bold; text-shadow: 0 0 10px rgba(255, 214, 0, 0.5); }

        /* --- PANTALLA 1: EL SOBRE --- */
        #pantalla-sobre { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: radial-gradient(circle, #1a1a1a, #000); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 100; text-align: center; transition: opacity 0.8s; }
        .sobre-icono { font-size: 80px; cursor: pointer; animation: latido 1.5s infinite; filter: drop-shadow(0 0 10px #ffd600); margin: 20px; }
        @keyframes latido { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.1); } }

        /* --- PANTALLA 2: EL REGALO --- */
        #regalo { position: relative; width: 100%; max-width: 400px; height: 100dvh; display: flex; flex-direction: column; align-items: center; justify-content: space-around; padding: 30px 20px; z-index: 10; }
        
        .stars-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: url('https://www.transparenttextures.com/patterns/stardust.png'); opacity: 0.3; z-index: 1; pointer-events: none; }

        .shooting-star { position: absolute; width: 2px; height: 2px; background: #fff; border-radius: 50%; opacity: 0; z-index: 2; pointer-events: none; animation: shoot 3s linear infinite; }
        @keyframes shoot {
            0% { transform: translate(-10vw, -10vh) rotate(45deg); opacity: 1; }
            100% { transform: translate(110vw, 60vh) rotate(45deg); opacity: 0; }
        }

        /* REPRODUCTOR DISCRETO (Gris translúcido) */
        .player { background: rgba(255, 255, 255, 0.1); color: #ccc; width: 95%; padding: 8px 15px; border-radius: 12px; display: flex; align-items: center; gap: 8px; z-index: 20; border: 1px solid rgba(255, 255, 255, 0.15); font-size: 0.75rem; }
        #play-icon { cursor: pointer; font-size: 1rem; color: #fff; }
        #progress-bar { flex-grow: 1; height: 4px; background: rgba(255,255,255,0.2); border-radius: 2px; overflow: hidden; position: relative; }
        #progress-fill { height: 100%; width: 0%; background: #fff; transition: width 0.1s linear; }
        .time-label { min-width: 35px; text-align: center; font-family: monospace; }

        /* CORAZÓN CON FOTO */
        .heart-photo { width: 220px; height: 200px; background: #ffd600; -webkit-clip-path: url(#svgHeart); clip-path: url(#svgHeart); display: flex; justify-content: center; align-items: center; box-shadow: 0 0 30px rgba(255, 214, 0, 0.4); z-index: 15; }
        .heart-photo img { width: 100%; height: 100%; object-fit: cover; }

        /* CONTADOR (Letras blancas brillantes) */
        .contador { background: rgba(255, 255, 255, 0.03); padding: 15px; border-radius: 15px; border: 1px solid rgba(255, 255, 255, 0.1); text-align: center; width: 90%; z-index: 20; }
        .contador p { margin: 0 0 5px 0; font-size: 0.8rem; color: #aaa; }
        #tiempo { font-size: 1.3rem; color: #fff; font-weight: bold; text-shadow: 0 0 10px #fff; }

        /* ELEMENTOS FLOTANTES */
        .magic-element { position: absolute; font-size: 22px; animation: float 6s ease-in-out infinite; z-index: 5; opacity: 0.8; pointer-events: none; }
        @keyframes float { 0%, 100% { transform: translateY(0) rotate(0deg); } 50% { transform: translateY(-40px) rotate(20deg); } }
    </style>
</head>
<body>
    <svg width="0" height="0"><defs><clipPath id="svgHeart" clipPathUnits="objectBoundingBox"><path d="M0.5,1 C0.5,1,0,0.7,0,0.35 C0,0.15,0.15,0,0.35,0 C0.45,0,0.5,0.1,0.5,0.1 C0.5,0.1,0.55,0,0.65,0 C0.85,0,1,0.15,1,0.35 C1,0.7,0.5,1,0.5,1"></path></clipPath></defs></svg>
    
    <div id="pantalla-sobre">
        <h2 class="texto-amarillo">Para ti Chanita ❤️</h2>
        <div class="sobre-icono" onclick="abrirRegalo()">📩</div>
        <p>Toca para abrir</p>
    </div>

    <div id="regalo" class="hidden">
        <div class="stars-overlay"></div>
        <p class="texto-amarillo">"Desde que dijiste que sí, los días han sido más felices"</p>
        
        <div class="player">
            <span id="play-icon" onclick="toggleAudio()">⏸</span>
            <span class="time-label" id="time-current">0:00</span>
            <div id="progress-bar"><div id="progress-fill"></div></div>
            <span class="time-label" id="time-total">0:00</span>
            <audio id="musica" loop preload="auto">
                <source src="https://files.catbox.moe/rgiuha.mp3" type="audio/mpeg">
            </audio>
        </div>

        <div class="heart-photo">
            <img src="https://i.postimg.cc/52571Dg1/foto-jpeg.jpg" alt="Nosotros">
        </div>

        <div class="contador">
            <p>Juntos desde hace:</p>
            <span id="tiempo">Calculando...</span>
        </div>

        <p style="color:#ffd600; font-size: 14px; z-index:20; font-weight:bold;">🌼 Flores amarillas para mi Chanita bella 🌼</p>
    </div>

    <script>
        const audio = document.getElementById('musica');
        
        function formatTime(seconds) {
            const min = Math.floor(seconds / 60);
            const sec = Math.floor(seconds % 60);
            return `${min}:${sec < 10 ? '0' : ''}${sec}`;
        }

        function abrirRegalo() {
            audio.play().catch(e => console.log("Audio ready"));
            document.getElementById('pantalla-sobre').style.opacity = '0';
            setTimeout(() => {
                document.getElementById('pantalla-sobre').classList.add('hidden');
                document.getElementById('regalo').classList.remove('hidden');
                crearMagia();
                crearEstrellasFugaces();
            }, 800);
        }

        function toggleAudio() {
            const btn = document.getElementById('play-icon');
            if (audio.paused) { audio.play(); btn.innerText = '⏸'; }
            else { audio.pause(); btn.innerText = '▶'; }
        }

        audio.addEventListener('loadedmetadata', () => {
            document.getElementById('time-total').innerText = formatTime(audio.duration);
        });

        audio.ontimeupdate = () => {
            const fill = document.getElementById('progress-fill');
            const current = document.getElementById('time-current');
            if (audio.duration) {
                fill.style.width = (audio.currentTime / audio.duration * 100) + "%";
                current.innerText = formatTime(audio.currentTime);
            }
        };

        const inicio = new Date(2025, 2, 7, 18, 27, 0).getTime();
        setInterval(() => {
            const diff = new Date().getTime() - inicio;
            const d = Math.floor(diff / 86400000);
            const h = Math.floor((diff % 86400000) / 3600000);
            const m = Math.floor((diff % 3600000) / 60000);
            const s = Math.floor((diff % 60000) / 1000);
            const f = (n) => n < 10 ? '0'+n : n;
            document.getElementById('tiempo').innerText = `${d}d ${f(h)}h ${f(m)}m ${f(s)}s`;
        }, 1000);

        function crearMagia() {
            const container = document.getElementById('regalo');
            const emojis = ['🌼', '💛', '✨'];
            for(let i=0; i<15; i++) {
                const element = document.createElement('div');
                element.className = 'magic-element';
                element.innerText = emojis[Math.floor(Math.random() * emojis.length)];
                element.style.left = Math.random() * 90 + 'vw';
                element.style.top = Math.random() * 80 + 'vh';
                element.style.animationDelay = Math.random() * 5 + 's';
                container.appendChild(element);
            }
        }

        function crearEstrellasFugaces() {
            const container = document.getElementById('regalo');
            setInterval(() => {
                const star = document.createElement('div');
                star.className = 'shooting-star';
                star.style.left = Math.random() * 50 + 'vw';
                star.style.top = Math.random() * 40 + 'vh';
                container.appendChild(star);
                setTimeout(() => star.remove(), 3000);
            }, 2000);
        }
    </script>
</body>
</html>
